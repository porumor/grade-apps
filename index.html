<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <title>ระบบคำนวณเกรดมหาวิทยาลัย</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 16px;
      color: #1e293b;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    label {
      display: block;
      margin: 8px 0 6px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .actions, .mode-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 15px;
    }
    button:hover { background: #1d4ed8; }
    .mode-btn.active { background: #16a34a; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .course-head,
    .course-row {
      display: grid;
      grid-template-columns: 3fr 1fr 1fr 70px;
      gap: 8px;
      align-items: center;
    }
    .course-head {
      font-weight: 700;
      background: #eef2ff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .course-row { margin-bottom: 8px; }
    .result-box {
      background: #eff6ff;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.7;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ระบบคำนวณผลการศึกษา</h1>

    <section class="card">
      <h2>ข้อมูลเทอม</h2>
      <div class="grid-2">
        <div>
          <label>ชื่อ-สกุล</label>
          <input type="text" id="studentName" placeholder="กรอกชื่อ-สกุล" />
        </div>
        <div>
          <label>รหัสนักศึกษา</label>
          <input type="text" id="studentId" placeholder="กรอกรหัสนักศึกษา" />
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label>ภาคการศึกษา</label>
          <input type="text" id="termName" placeholder="เช่น 1/2568" />
        </div>
        <div>
          <label>ปีการศึกษา</label>
          <input type="text" id="yearName" placeholder="2568" />
        </div>
      </div>

      <div class="mode-bar">
        <button type="button" id="modeScoreBtn" class="mode-btn active">โหมดคะแนน</button>
        <button type="button" id="modeGradeBtn" class="mode-btn">โหมดเกรด A-F</button>
      </div>

      <div class="actions">
        <button type="button" id="addRowBtn">เพิ่มรายวิชา</button>
        <button type="button" id="calculateBtn">คำนวณ</button>
        <button type="button" id="saveBtn">บันทึกเทอม</button>
        <button type="button" id="clearBtn">ล้างเทอมนี้</button>
        <button type="button" id="clearHistoryBtn" class="danger">ล้างประวัติการบันทึก</button>
      </div>
    </section>

    <section class="card">
      <h2>รายวิชา</h2>
      <div class="course-head">
        <div>ชื่อวิชา</div>
        <div>หน่วยกิต</div>
        <div id="valueHeader">คะแนน</div>
        <div>ลบ</div>
      </div>
      <div id="courseList"></div>
    </section>

    <section class="card">
      <h2>ผลการคำนวณเทอมนี้</h2>
      <div id="currentResult" class="result-box">ยังไม่ได้คำนวณ</div>
    </section>

    <section class="card">
      <h2>ประวัติเทอมที่บันทึก</h2>
      <div id="savedTerms" class="result-box">ยังไม่มีข้อมูล</div>
    </section>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const courseList = document.getElementById('courseList');
      const currentResult = document.getElementById('currentResult');
      const savedTerms = document.getElementById('savedTerms');
      const addRowBtn = document.getElementById('addRowBtn');
      const calculateBtn = document.getElementById('calculateBtn');
      const saveBtn = document.getElementById('saveBtn');
      const clearBtn = document.getElementById('clearBtn');
      const clearHistoryBtn = document.getElementById('clearHistoryBtn');
      const modeScoreBtn = document.getElementById('modeScoreBtn');
      const modeGradeBtn = document.getElementById('modeGradeBtn');
      const valueHeader = document.getElementById('valueHeader');
      const STORAGE_KEY = 'university_grade_system_v4';

      let mode = 'score';
      let rowsData = [];
      let nextCourseNo = 1;

      const gradeMap = [
        { grade: 'A', min: 80, gp: 4.0 },
        { grade: 'B+', min: 75, gp: 3.5 },
        { grade: 'B', min: 70, gp: 3.0 },
        { grade: 'C+', min: 65, gp: 2.5 },
        { grade: 'C', min: 60, gp: 2.0 },
        { grade: 'D+', min: 55, gp: 1.5 },
        { grade: 'D', min: 50, gp: 1.0 },
        { grade: 'F', min: 0, gp: 0.0 }
      ];

      const gradeOptions = gradeMap.map(g => `<option value="${g.grade}">${g.grade}</option>`).join('');

      function n(v) {
        const x = Number(v);
        return Number.isFinite(x) ? x : 0;
      }

      function round10(v) {
        const p = 1e10;
        return Math.round((n(v) + Number.EPSILON) * p) / p;
      }

      function display2(v) {
        return Math.trunc(round10(v) * 100) / 100;
      }

      function fmt2(v) {
        return display2(v).toFixed(2);
      }

      function getGradeFromScore(score) {
        return gradeMap.find(item => score >= item.min) || gradeMap[gradeMap.length - 1];
      }

      function gpFromGrade(grade) {
        const item = gradeMap.find(g => g.grade === grade);
        return item ? item.gp : 0;
      }

      function renumberCourses() {
        const rows = [...courseList.querySelectorAll('.course-row')];
        rows.forEach((row, index) => {
          const input = row.querySelector('.course-name');
          if (input && (input.value.trim() === '' || /^[0-9]+$/.test(input.value.trim()))) {
            input.value = String(index + 1);
          }
        });
        nextCourseNo = rows.length + 1;
      }

      function createRow(data = {}) {
        const row = document.createElement('div');
        row.className = 'course-row';

        const defaultName = data.name || String(nextCourseNo);
        row.innerHTML = `
          <input type="text" class="course-name" placeholder="ชื่อวิชา" value="${defaultName}">
          <input type="number" class="course-credit" placeholder="หน่วยกิต" min="0" step="0.5" value="${data.credit ?? ''}">
          <div class="value-area"></div>
          <button type="button" class="danger remove-btn">ลบ</button>
        `;

        const valueArea = row.querySelector('.value-area');

        function renderValue() {
          if (mode === 'score') {
            valueArea.innerHTML = `<input type="number" class="course-score" placeholder="คะแนน" min="0" max="100" step="0.0000000001" value="${data.score ?? ''}">`;
          } else {
            valueArea.innerHTML = `<select class="course-grade">${gradeOptions}</select>`;
            valueArea.querySelector('.course-grade').value = data.grade || 'A';
          }
        }

        renderValue();

        row.querySelector('.remove-btn').addEventListener('click', () => {
          row.remove();
          renumberCourses();
        });

        courseList.appendChild(row);
        nextCourseNo += 1;
        renumberCourses();
      }

      function syncRowsData() {
        const rows = [...courseList.querySelectorAll('.course-row')];
        rowsData = rows.map(row => {
          const name = row.querySelector('.course-name').value.trim();
          const credit = row.querySelector('.course-credit').value;
          let score = '';
          let grade = 'A';
          if (mode === 'score') score = row.querySelector('.course-score')?.value || '';
          else grade = row.querySelector('.course-grade')?.value || 'A';
          return { name, credit, score, grade };
        });
      }

      function rebuildRows() {
        courseList.innerHTML = '';
        rowsData.forEach(d => createRow(d));
        if (!rowsData.length) {
          rowsData = [{}, {}];
          nextCourseNo = 1;
          rowsData.forEach(d => createRow(d));
        }
        renumberCourses();
      }

      function switchMode(newMode) {
        syncRowsData();
        mode = newMode;
        modeScoreBtn.classList.toggle('active', mode === 'score');
        modeGradeBtn.classList.toggle('active', mode === 'grade');
        valueHeader.textContent = mode === 'score' ? 'คะแนน' : 'เกรด';
        rebuildRows();
      }

      function getCourses() {
        const rows = [...courseList.querySelectorAll('.course-row')];
        return rows.map(row => {
          const name = row.querySelector('.course-name').value.trim();
          const credit = n(row.querySelector('.course-credit').value);
          if (!name || !credit) return null;

          let grade = 'F';
          let score = null;
          let gp = 0;

          if (mode === 'score') {
            const s = n(row.querySelector('.course-score')?.value);
            if (!row.querySelector('.course-score')?.value.trim()) return null;
            score = s;
            const g = getGradeFromScore(s);
            grade = g.grade;
            gp = g.gp;
          } else {
            grade = row.querySelector('.course-grade')?.value || 'F';
            gp = gpFromGrade(grade);
          }

          return { name, credit: round10(credit), score, grade, gp: round10(gp) };
        }).filter(Boolean);
      }

      function calculateCourses(courses) {
        let registeredCredits = 0;
        let passedCredits = 0;
        let weightedPoints = 0;

        courses.forEach(course => {
          registeredCredits = round10(registeredCredits + course.credit);
          weightedPoints = round10(weightedPoints + round10(course.credit * course.gp));
          if (course.gp > 0) passedCredits = round10(passedCredits + course.credit);
        });

        const gpa = registeredCredits ? round10(weightedPoints / registeredCredits) : 0;
        return { courses, registeredCredits, passedCredits, weightedPoints, gpa };
      }

      function renderCurrentResult(calc) {
        currentResult.innerHTML = `
          <strong>โหมดปัจจุบัน:</strong> ${mode === 'score' ? 'กรอกคะแนน' : 'เลือกเกรด A-F'}<br>
          <strong>หน่วยกิตลงทะเบียน:</strong> ${fmt2(calc.registeredCredits)}<br>
          <strong>หน่วยกิตสอบผ่าน:</strong> ${fmt2(calc.passedCredits)}<br>
          <strong>เกรดเฉลี่ยเทอมนี้:</strong> ${fmt2(calc.gpa)}<br>
          <strong>คะแนนถ่วงน้ำหนัก:</strong> ${fmt2(calc.weightedPoints)}
        `;
      }

      function loadData() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"terms":[]}');
      }

      function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function renderSavedTerms() {
        const data = loadData();
        const terms = data.terms || [];

        if (!terms.length) {
          savedTerms.innerHTML = 'ยังไม่มีเทอมที่บันทึกไว้';
          return;
        }

        const allCourses = terms.flatMap(t => t.courses || []);
        const totalReg = allCourses.reduce((s, c) => round10(s + n(c.credit)), 0);
        const totalPass = allCourses.reduce((s, c) => round10(s + ((n(c.gp) > 0) ? n(c.credit) : 0)), 0);
        const totalPoints = allCourses.reduce((s, c) => round10(s + round10(n(c.credit) * n(c.gp))), 0);
        const gpa = totalReg ? round10(totalPoints / totalReg) : 0;

        savedTerms.innerHTML = `
          ${terms.map(t => `
            <div style="margin-bottom:12px">
              <strong>${t.term}</strong><br>
              หน่วยกิตลงทะเบียน: ${fmt2(t.summary.registeredCredits)}<br>
              หน่วยกิตสอบผ่าน: ${fmt2(t.summary.passedCredits)}<br>
              GPA เทอม: ${fmt2(t.summary.gpa)}
            </div>
          `).join('')}
          <hr>
          <strong>สะสมรวม</strong><br>
          หน่วยกิตลงทะเบียนสะสม: ${fmt2(totalReg)}<br>
          หน่วยกิตสอบผ่านสะสม: ${fmt2(totalPass)}<br>
          เกรดเฉลี่ยสะสม: ${fmt2(gpa)}<br>
          เกรดเฉลี่ยสะสมตามโครงสร้างหลักสูตร: ${fmt2(gpa)}
        `;
      }

      function calculate() {
        const courses = getCourses();
        const calc = calculateCourses(courses);
        renderCurrentResult(calc);
        return { courses, calc };
      }

      function saveTerm() {
        syncRowsData();
        const termName = document.getElementById('termName').value.trim() || `เทอม ${Date.now()}`;
        const { courses, calc } = calculate();

        if (!courses.length) {
          alert('ยังไม่มีข้อมูลที่คำนวณได้');
          return;
        }

        const data = loadData();
        data.terms = data.terms || [];
        data.terms.push({
          term: termName,
          mode,
          courses,
          summary: {
            registeredCredits: round10(calc.registeredCredits),
            passedCredits: round10(calc.passedCredits),
            weightedPoints: round10(calc.weightedPoints),
            gpa: round10(calc.gpa)
          }
        });

        saveData(data);
        renderSavedTerms();
        alert('บันทึกเทอมเรียบร้อย');
      }

      function clearCurrentTerm() {
        rowsData = [];
        nextCourseNo = 1;
        courseList.innerHTML = '';
        rowsData.push({});
        rowsData.push({});
        rowsData.forEach(d => createRow(d));
        renumberCourses();
        currentResult.innerHTML = 'ยังไม่ได้คำนวณ';
      }

      function clearHistory() {
        const ok = confirm('ต้องการล้างประวัติการบันทึกทั้งหมดใช่หรือไม่?');
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEY);
        renderSavedTerms();
        alert('ล้างประวัติเรียบร้อย');
      }

      modeScoreBtn.addEventListener('click', () => switchMode('score'));
      modeGradeBtn.addEventListener('click', () => switchMode('grade'));
      addRowBtn.addEventListener('click', () => {
        rowsData.push({});
        createRow();
        renumberCourses();
      });
      calculateBtn.addEventListener('click', () => calculate());
      saveBtn.addEventListener('click', () => saveTerm());
      clearBtn.addEventListener('click', () => clearCurrentTerm());
      clearHistoryBtn.addEventListener('click', () => clearHistory());

      rowsData = [{}, {}];
      rowsData.forEach(d => createRow(d));
      renumberCourses();
      renderSavedTerms();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
